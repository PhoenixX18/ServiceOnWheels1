spring.application.name=auth-service
server.port=8081

spring.data.mongodb.uri=mongodb://localhost:27017/service_on_wheels

jwt.secret=ServiceOnWheels_SuperSecret_JWT_Key_2024_ChangeInProd!
jwt.expiration=86400000

logging.level.com.serviceonwheels=DEBUG
logging.level.org.springframework.security=INFO

# ── Email / SMTP Configuration (Gmail) ─────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Set to false in production if not using a dummy from address
spring.mail.test-connection=false